<form method="GET" action="{% url 'index' %}">
    <input type="hidden" name="q" value="{{ request.GET.q|default:'' }}">

    <div class="mb-3">
        <label for="min_p" class="form-label small fw-bold">Min Price</label>
        <input type="number" id="min_p" name="min_price" class="form-control" value="{{ request.GET.min_price }}">
    </div>

    <div class="mb-3">
        <label for="max_p" class="form-label small fw-bold">Max Price</label>
        <input type="number" id="max_p" name="max_price" class="form-control" value="{{ request.GET.max_price }}">
    </div>

    <div class="mb-4">
        <label for="sort_by" class="form-label small fw-bold">Sort By</label>
        <select id="sort_by" name="sort" class="form-select">
            <option value="">Default</option>
            <option value="price_low" {% if request.GET.sort == 'price_low' %}selected{% endif %}>Low to High</option>
            <option value="price_high" {% if request.GET.sort == 'price_high' %}selected{% endif %}>High to Low</option>
        </select>
    </div>

    <button type="submit" class="btn btn-pro w-100 mb-2">APPLY</button>
    <a href="{% url 'index' %}" class="btn btn-light w-100 border">RESET</a>
</form>
