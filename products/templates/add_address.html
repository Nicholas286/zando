{% extends 'base.html' %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <h4 class="fw-bold mb-4">Add New Address</h4>

    <div class="card border-0 shadow-sm p-4">
        <form method="POST">
            {% csrf_token %}

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name</label>
                    {{ form.first_name }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name</label>
                    {{ form.last_name }}
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                {{ form.phone }}
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">County</label>
                    {{ form.county }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Town/City</label>
                    {{ form.town }}
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Street/Building Details</label>
                {{ form.street }}
            </div>

            <div class="mb-3 form-check">
                {{ form.is_default }}
                <label class="form-check-label">Set as default address</label>
            </div>

            <button type="submit" class="btn btn-primary w-100">SAVE ADDRESS</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('id_county').addEventListener('change', function() {
        var countyId = this.value;
        if (!countyId) return;
        fetch(`/products/get-towns/?county_id=${countyId}`)
            .then(response => response.json())
            .then(data => {
                var townSelect = document.getElementById('id_town');
                townSelect.innerHTML = '<option value="">Select a town</option>';
                data.forEach(town => {
                    townSelect.innerHTML += `<option value="${town.id}">${town.name}</option>`;
                });
            });
    });
</script>
{% endblock %}
