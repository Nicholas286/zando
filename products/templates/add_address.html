{% extends 'base.html' %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <h4 class="fw-bold mb-4">Add New Address</h4>

    <div class="card border-0 shadow-sm p-4">
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">Street Address</label>
                {{ form.street }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">City</label>
                {{ form.city }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                {{ form.phone }}
            </div>

            <div class="mb-3 form-check">
                {{ form.is_default }}
                <label class="form-check-label">Set as default address</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">SAVE ADDRESS</button>
            <a href="{% url 'products:address_book' %}" class="btn btn-link w-100 mt-2 text-muted">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
